name: Backend CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: pip install -e '.[dev]'

      - name: Ruff
        run: ruff check app tests

      - name: Pytest
        run: pytest -q
